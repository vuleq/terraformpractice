name: Lambda Deploy with Manual Approval

on:
  push:
    branches: [ 'vule/tma/prod-2.0.1-draft' ]
    paths:
      - 'TMA_PROD/devops/**'
  # Pull Request trigger đã tắt - chỉ chạy khi push code
  # pull_request:
  #   branches: [ main, 'vule/tma/prod-2.0.*', 'tma/prod-2.0.*', 'vule/tma/uat-2.0.*' ]
  #   paths:
  #     - 'TMA_PROD/devops/**'
  
  # Manual trigger đã tắt - chỉ chạy khi push code
  # workflow_dispatch:
  #   inputs:
  #     environment:
  #       description: 'Deployment Environment'
  #       required: true
  #       default: 'prod'
  #       type: choice
  #       options:
  #       - prod
  #     force_deploy:
  #       description: 'Force deploy all functions and layers'
  #       required: false
  #       default: false
  #       type: boolean
  #     deploy_functions:
  #       description: 'Deploy specific functions (comma-separated)'
  #       required: false
  #       type: string
  #     deploy_layers:
  #       description: 'Deploy specific layers (comma-separated)'
  #       required: false
  #       type: string
  #     use_s3_source:
  #       description: 'Use existing S3 source code (skip build)'
  #       required: false
  #       default: false
  #       type: boolean
  #     s3_prefix:
  #       description: 'S3 prefix for source code (if using S3 source)'
  #       required: false
  #       type: string

env:
  AWS_REGION: ap-southeast-1
  TERRAFORM_VERSION: 1.5.0

jobs:
  # =============================================================================
  # JOB 1: DETECT CHANGES - Phát hiện thay đổi
  # =============================================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.changes.outputs.functions }}    # Functions cần deploy
      layers: ${{ steps.changes.outputs.layers }}          # Layers cần deploy
      has-changes: ${{ steps.changes.outputs.has-changes }} # Có thay đổi không
    steps:
      # STEP 1.1: Checkout code từ GitHub repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Lấy toàn bộ git history để so sánh

      # STEP 1.2: Detect changes - Phát hiện thay đổi
      - name: Detect changes
        id: changes
        run: |
          echo "Detecting changes for TMA_PROD project..."
          
          # Lấy danh sách files đã thay đổi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Nếu là Pull Request, so sánh với base branch
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          else
            # Nếu là push, so sánh với commit trước
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Detect function changes - Phát hiện thay đổi functions
          FUNCTIONS=""
          # Auto detect - chỉ deploy khi có thay đổi Terraform
          if echo "$CHANGED_FILES" | grep -q "TMA_PROD/devops/"; then
            echo "Terraform changes detected - will deploy all functions"
            FUNCTIONS="ALL"
          else
            echo "No relevant changes detected"
            FUNCTIONS=""
          fi
          
          # Detect layer changes - Phát hiện thay đổi layers
          LAYERS=""
          # Auto detect - chỉ deploy khi có thay đổi Terraform
          if echo "$CHANGED_FILES" | grep -q "TMA_PROD/devops/"; then
            echo "Terraform changes detected - will deploy all layers"
            LAYERS="ALL"
          else
            echo "No relevant changes detected"
            LAYERS=""
          fi
          
          # Output results
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "layers=$LAYERS" >> $GITHUB_OUTPUT
          
          if [ -n "$FUNCTIONS" ] || [ -n "$LAYERS" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected - Functions: [$FUNCTIONS], Layers: [$LAYERS]"
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected"
          fi

  # =============================================================================
  # JOB 2: TERRAFORM PLAN - Chạy terraform plan và chờ approval
  # =============================================================================
  terraform-plan:
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      plan-exit-code: ${{ steps.plan.outputs.exit-code }}
    steps:
      # STEP 2.1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # STEP 2.2: Setup AWS CLI
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # STEP 2.3: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # STEP 2.4: Install dependencies
      - name: Install dependencies
        run: |
          cd TMA_PROD/devops
          npm install

      # STEP 2.5: Terraform Init
      - name: Terraform Init
        run: |
          cd TMA_PROD/devops/env/prod
          terraform init

      # STEP 2.6: Terraform Plan
      - name: Terraform Plan
        id: plan
        run: |
          cd TMA_PROD/devops/env/prod
          terraform plan -out=tfplan -detailed-exitcode
          echo "exit-code=$?" >> $GITHUB_OUTPUT

      # STEP 2.7: Upload Terraform Plan
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: TMA_PROD/devops/env/prod/tfplan
          retention-days: 1

      # STEP 2.8: Comment Plan Results
      - name: Comment Plan Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read terraform plan output
            const planOutput = fs.readFileSync('TMA_PROD/devops/env/prod/tfplan', 'utf8');
            
            // Create comment
            const comment = `## 📋 Terraform Plan Results
            
            **Plan Exit Code:** ${{ steps.plan.outputs.exit-code }}
            
            **Plan Details:**
            \`\`\`
            ${planOutput}
            \`\`\`
            
            **Next Steps:**
            - If plan looks good, approve the deployment
            - If plan has issues, fix them and push again
            `;
            
            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # =============================================================================
  # JOB 3: MANUAL APPROVAL - Chờ approval từ user
  # =============================================================================
  manual-approval:
    needs: [detect-changes, terraform-plan]
    if: needs.detect-changes.outputs.has-changes == 'true' && needs.terraform-plan.outputs.plan-exit-code == '2'
    runs-on: ubuntu-latest
    steps:
      # STEP 3.1: Manual Approval
      - name: Manual Approval Required
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ github.actor }}
          minimum-approvals: 1
          issue-title: "Terraform Deployment Approval Required"
          issue-body: |
            ## 🚀 Terraform Deployment Approval Required
            
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Actor:** ${{ github.actor }}
            
            **Changes Detected:**
            - Functions: ${{ needs.detect-changes.outputs.functions }}
            - Layers: ${{ needs.detect-changes.outputs.layers }}
            
            **Terraform Plan:**
            - Exit Code: ${{ needs.terraform-plan.outputs.plan-exit-code }}
            - Plan File: Available in artifacts
            
            **Please review the terraform plan and approve if changes look correct.**
            
            **⚠️ This will deploy to PRODUCTION environment!**

  # =============================================================================
  # JOB 4: DEPLOY LAMBDA - Deploy Lambda functions/layers
  # =============================================================================
  deploy-lambda:
    needs: [detect-changes, terraform-plan, manual-approval]
    if: needs.detect-changes.outputs.has-changes == 'true' && needs.terraform-plan.outputs.plan-exit-code == '2'
    runs-on: ubuntu-latest
    steps:
      # STEP 4.1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # STEP 4.2: Setup AWS CLI
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # STEP 4.3: Setup Node.js (for building source code)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # STEP 4.4: Install dependencies
      - name: Install dependencies
        run: |
          cd TMA_PROD/devops
          npm install

      # STEP 4.5: List S3 source code (for visibility)
      - name: List S3 source code
        run: |
          cd TMA_PROD/devops
          ./scripts/list-s3-source.sh \
            --bucket ${{ secrets.S3_BUCKET }} \
            --prefix "prod/release2.0"

      # STEP 4.6: Deploy from S3 source code
      - name: Deploy from S3 source code
        run: |
          cd TMA_PROD/devops
          
          if [ "${{ needs.detect-changes.outputs.functions }}" = "ALL" ]; then
            echo "🚀 Deploying ALL functions from S3..."
            ./scripts/map-and-deploy.sh \
              --bucket ${{ secrets.S3_BUCKET }} \
              --environment prod \
              --prefix "prod/release2.0" \
              --force
          fi
          
          if [ "${{ needs.detect-changes.outputs.layers }}" = "ALL" ]; then
            echo "🚀 Deploying ALL layers from S3..."
            ./scripts/map-and-deploy.sh \
              --bucket ${{ secrets.S3_BUCKET }} \
              --environment prod \
              --prefix "prod/release2.0" \
              --force
          fi

  # =============================================================================
  # JOB 5: APPLY TERRAFORM - Apply Terraform changes
  # =============================================================================
  apply-terraform:
    needs: [detect-changes, terraform-plan, manual-approval, deploy-lambda]
    if: needs.detect-changes.outputs.has-changes == 'true' && needs.terraform-plan.outputs.plan-exit-code == '2'
    runs-on: ubuntu-latest
    steps:
      # STEP 5.1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # STEP 5.2: Setup AWS CLI
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # STEP 5.3: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # STEP 5.4: Download Terraform Plan
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: TMA_PROD/devops/env/prod/

      # STEP 5.5: Apply Terraform changes
      - name: Apply Terraform changes
        run: |
          cd TMA_PROD/devops/env/prod
          terraform apply -auto-approve tfplan
          echo "✅ TMA_PROD deployment completed successfully"

      # STEP 5.6: Cleanup
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up temporary files..."
          rm -f TMA_PROD/devops/env/prod/tfplan
          echo "✅ Cleanup completed"
